format:
  revealjs:
    footer: 'Curso de R · Universidad El Bosque · Junio 2026 &nbsp;·&nbsp; <a href="../../index.html" style="color:inherit; opacity:0.6;">↩ Sitio del curso</a>'

logo: ../imagenes/favicon.svg
title-slide-attributes:
  data-background-color: "#121834"
  data-background-image: ../../imagenes/logo.svg
  data-background-position: "top center"
  data-background-size: "20%"
date-format: long
background-transition: fade
transition-speed: default
code-copy: false
incremental: true
auto-animate: true
lightbox: true
revealjs-plugins:
  - codefocus
include-after-body:
  text: |
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.reveal a[href^="http"]').forEach(function(a) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      });
    });

    Reveal.addEventListener('ready', function() {
      document.querySelectorAll('.reveal .slides img').forEach(function(img) {
        if (img.closest('a')) return;
        if (window.getComputedStyle(img).position === 'absolute') return;
        var src = img.getAttribute('src');
        if (!src || src.startsWith('data:')) return;
        var a = document.createElement('a');
        a.href = src;
        a.className = 'lightbox';
        img.parentNode.insertBefore(a, img);
        a.appendChild(img);
      });
      if (typeof GLightbox !== 'undefined') {
        GLightbox({ selector: '.lightbox' });
      }
    });
    </script>
