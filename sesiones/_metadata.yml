logo: ../imagenes/favicon.svg
code-copy: false
incremental: true
auto-animate: true
revealjs-plugins:
  - codefocus
include-after-body:
  text: |
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.reveal a[href^="http"]').forEach(function(a) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      });
    });
    </script>
